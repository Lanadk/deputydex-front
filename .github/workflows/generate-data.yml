name: Generate Data

on:
  push:
    branches: [feat/github-actions-setup]
  workflow_dispatch:

jobs:
  generate-data:
    runs-on: ubuntu-latest

    steps:
      - name: 🗒️ Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 INSTALL
        run: npm ci

      - name: 🚀 Run GENERATE DATA
        run: npm run data:generate

      - name: 🦆 PUSH RESULT
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/data

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update data"
            git push
          fi
